spring.application.name=api-gateway
server.port=8080

# ===== Multipart (damit CSV-Uploads durchs Gateway kommen) =====
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=200MB

# Tomcat-Limits (Standard: 2MB ? Connection-Reset bei grossen Uploads!)
server.tomcat.max-swallow-size=-1
server.tomcat.max-http-form-post-size=-1

# ===== Eureka Client =====
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true

# ===== Gateway-Routen =====
# Usermanagement-Service: /api/users/** -> lb://usermanagement
spring.cloud.gateway.mvc.routes[0].id=usermanagement-route
spring.cloud.gateway.mvc.routes[0].uri=lb://usermanagement
spring.cloud.gateway.mvc.routes[0].predicates[0]=Path=/api/users/**

# File-Management-Service: /api/files/** -> lb://file-management
spring.cloud.gateway.mvc.routes[1].id=file-management-route
spring.cloud.gateway.mvc.routes[1].uri=lb://file-management
spring.cloud.gateway.mvc.routes[1].predicates[0]=Path=/api/files/**

# AI-Analysis-Service: /api/analysis/** -> lb://ai-analysis-service
spring.cloud.gateway.mvc.routes[2].id=ai-analysis-route
spring.cloud.gateway.mvc.routes[2].uri=lb://ai-analysis-service
spring.cloud.gateway.mvc.routes[2].predicates[0]=Path=/api/analysis/**

# ===== HTTP-Client Timeouts (Gemini-Analyse kann lange dauern) =====
spring.cloud.gateway.mvc.http-client.connect-timeout=100s
spring.cloud.gateway.mvc.http-client.read-timeout=6000s

# ===== Logging =====
logging.level.org.springframework.cloud.gateway=DEBUG
logging.level.org.springframework.web=DEBUG

# ===== Actuator =====
management.endpoints.web.exposure.include=health,info,gateway
management.endpoint.gateway.enabled=true

