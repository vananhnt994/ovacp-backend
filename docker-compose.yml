# ==============================================================================
#  OCVAP Backend – Docker Compose
#  Startet alle 6 Microservices + PostgreSQL
#
#  Nutzung:
#    docker compose up -d --build      # Erstmalig bauen & starten
#    docker compose up -d              # Starten (bereits gebaut)
#    docker compose logs -f            # Logs verfolgen
#    docker compose down               # Alles stoppen
# ==============================================================================

services:

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: ocvap-postgres
    environment:
      POSTGRES_DB: ovacp-database
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: post123.PWD
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Eureka Server ──────────────────────────────────────────────────────────
  eureka:
    build:
      context: .
      dockerfile: Dockerfile
      target: eureka
    container_name: ocvap-eureka
    ports:
      - "8761:8761"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8761/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── API Gateway ────────────────────────────────────────────────────────────
  gateway:
    build:
      context: .
      dockerfile: Dockerfile
      target: gateway
    container_name: ocvap-gateway
    ports:
      - "8080:8080"
    environment:
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://eureka:8761/eureka/
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      # Eureka-basiertes Routing im Docker-Netzwerk
      ROUTE_USERMANAGEMENT: lb://usermanagement
      ROUTE_FILE_MANAGEMENT: lb://file-management
      ROUTE_AI_ANALYSIS: lb://ai-analysis-service
      ROUTE_CHART_DATA: lb://chart-data-service
    depends_on:
      eureka:
        condition: service_healthy

  # ── Usermanagement ─────────────────────────────────────────────────────────
  usermanagement:
    build:
      context: .
      dockerfile: Dockerfile
      target: usermanagement
    container_name: ocvap-usermanagement
    ports:
      - "8081:8081"
    environment:
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://eureka:8761/eureka/
      # Direkter JDBC-URL ueberschreibt die GCP-Cloud-SQL-Konfiguration
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/ovacp-database
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: post123.PWD
      SPRING_CLOUD_GCP_SQL_INSTANCE_CONNECTION_NAME: ""
    depends_on:
      eureka:
        condition: service_healthy
      postgres:
        condition: service_healthy

  # ── File Management ────────────────────────────────────────────────────────
  file-management:
    build:
      context: .
      dockerfile: Dockerfile
      target: file-management
    container_name: ocvap-file-management
    ports:
      - "8082:8082"
    environment:
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://eureka:8761/eureka/
    volumes:
      - uploads:/app/uploads
    depends_on:
      eureka:
        condition: service_healthy

  # ── AI Analysis Service ────────────────────────────────────────────────────
  ai-analysis:
    build:
      context: .
      dockerfile: Dockerfile
      target: ai-analysis
    container_name: ocvap-ai-analysis
    ports:
      - "8083:8083"
    environment:
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://eureka:8761/eureka/
      # Gemini API-Key als Umgebungsvariable (nicht im Image!)
      GEMINI_API_KEY: ${GEMINI_API_KEY:-DEIN_API_KEY_HIER}
    depends_on:
      eureka:
        condition: service_healthy
      file-management:
        condition: service_started

  # ── Chart Data Service ─────────────────────────────────────────────────────
  chart-data:
    build:
      context: .
      dockerfile: Dockerfile
      target: chart-data
    container_name: ocvap-chart-data
    ports:
      - "8084:8084"
    environment:
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://eureka:8761/eureka/
    depends_on:
      eureka:
        condition: service_healthy
      file-management:
        condition: service_started

volumes:
  pgdata:
  uploads:

